<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 레시피 페이지</title>
</head>
<body>
    <h1>김치볶음밥</h1>
    <img src="https://recipe1.ezmember.co.kr/cache/recipe/2019/03/14/4c1d1794eb908c1bfec012999d7b43cc1.jpg" alt="김치볶음밥" width="150">
    <div>
     <h2>재료</h2>
     <table border="1" >
      <tr>
        <th>재료</th>
      <th>양</th>
      </tr>
      <tr>
        <td>밥</td>
        <td>1공기</td>
      </tr>
      <tr>
        <td>김치</td>
        <td>반포기</td>
      </tr>
      <tr>
        <td>간장</td>
        <td>1큰술</td>
      </tr>
     </table>
    </div>
    <hr>  
    <div>
        <h2>조리 순서</h2>
        <ol>
            <li>팬을 <b>중불(<span>180℃</span>)</b>로 예열해요</li>
            <li>기름을 두른 팬에 자른 김치를 넣고 볶아요
            <li>밥을 넣고 함께 볶아요</li>
            <li>간장으로 간을 맞추고 <b>2분</b> 더 볶아요</li>
            <li><mark>참기름을 두르고</mark> 맛있게 먹어요</li>
        </ol>
        <p> <a href="https://www.youtube.com/watch?v=OXP7_KVOYN4" target="_blank"> ▶️유투브 레시피 영상 보기</a> </p>
    </div>
        <hr>
         <h2>주의사항</h2>
         <ul>
            <li><b>고온</b>에서 빠르게 볶아야 해요</li>
            <li>간장은 <b>조금씩</b> 넣어야 짜지 않아요</li>
         </ul>      
       
       
  
    
</body>
</html>
